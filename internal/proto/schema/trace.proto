syntax = "proto3";
package grog.proto.v1;

option go_package = "grog/proto/gen";

// A single target's execution span within a build trace.
message TargetSpan {
  string label   = 1; // e.g. "//pkg:target"
  string package = 2;

  string change_hash = 3;
  string output_hash = 4;

  enum Status {
    UNKNOWN   = 0;
    SUCCESS   = 1;
    FAILURE   = 2;
    CANCELLED = 3;
  }
  Status status = 5;

  enum CacheResult {
    CACHE_MISS = 0;
    CACHE_HIT  = 1;
    CACHE_SKIP = 2; // e.g. no-cache tag
  }
  CacheResult cache_result = 6;

  string command  = 7; // truncated at 1KB
  int32 exit_code = 8;
  bool is_test    = 9;

  repeated string tags         = 10;
  repeated string dependencies = 11;

  // Wall-clock timing
  int64 start_time_unix_millis = 12;
  int64 end_time_unix_millis   = 13;
  int64 total_duration_millis  = 14;

  // Phase-level timing (all in milliseconds) for bottleneck analysis.
  int64 queue_wait_millis      = 15; // time waiting in worker pool queue
  int64 hash_duration_millis   = 16; // time computing ChangeHash
  int64 cache_check_millis     = 17; // cache load + output checks + taint check
  int64 command_duration_millis = 18; // shell command execution (0 if cache hit)
  int64 output_write_millis    = 19; // writing outputs + computing OutputHash
  int64 output_load_millis     = 20; // loading cached outputs (0 if cache miss)
  int64 cache_write_millis     = 21; // persisting TargetResult to cache
  int64 dep_load_millis        = 22; // loading dependency outputs (minimal mode)
}

// A complete build trace for one grog invocation.
message BuildTrace {
  string trace_id   = 1; // UUID v4
  string workspace  = 2; // workspace root basename
  string git_commit = 3;
  string git_branch = 4;

  string grog_version = 5;
  string platform     = 6; // e.g. "darwin/arm64"
  string command      = 7; // "build", "test", "run"

  int64 start_time_unix_millis = 8;
  int64 total_duration_millis  = 9;

  int32 total_targets   = 10;
  int32 success_count   = 11;
  int32 failure_count   = 12;
  int32 cache_hit_count = 13;

  int64 critical_path_exec_millis  = 14;
  int64 critical_path_cache_millis = 15;
  int64 async_cache_wait_millis    = 16;

  repeated TargetSpan spans            = 17;
  repeated string     requested_patterns = 18;

  bool is_ci = 19;
}

// Lightweight index entry for listing traces without loading full data.
message TraceIndexEntry {
  string trace_id                = 1;
  int64  start_time_unix_millis  = 2;
  string command                 = 3;
  int32  total_targets           = 4;
  int32  failure_count           = 5;
  int32  cache_hit_count         = 6;
  int64  total_duration_millis   = 7;
  string git_commit              = 8;
  bool   is_ci                   = 9;
}

// Index of all stored traces.
message TraceIndex {
  repeated TraceIndexEntry entries = 1;
}
