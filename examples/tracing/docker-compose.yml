services:
  jaeger:
    image: jaegertracing/jaeger:2.17.0
    ports:
      - "${JAEGER_UI_PORT:-16686}:16686" # UI
      - "${JAEGER_OTLP_PORT:-4318}:4318" # OTLP HTTP
    environment:
      COLLECTOR_OTLP_ENABLED: "true"

  tempo:
    image: grafana/tempo:2.7.1
    command: ["-config.file=/etc/tempo.yml"]
    volumes:
      - ./tempo.yml:/etc/tempo.yml:ro
    ports:
      - "${TEMPO_OTLP_PORT:-4320}:4318" # OTLP HTTP (remapped to avoid conflict with Jaeger)
      - "${TEMPO_API_PORT:-3200}:3200" # Tempo API

  loki:
    image: grafana/loki:3.4.2
    ports:
      - "${LOKI_PORT:-3100}:3100"
    command: ["-config.file=/etc/loki/local-config.yaml"]

  promtail:
    image: grafana/promtail:3.4.2
    volumes:
      - ./promtail.yml:/etc/promtail/config.yml:ro
      - /tmp:/tmp:ro
      - promtail_positions:/var/lib/promtail
    command: ["-config.file=/etc/promtail/config.yml"]
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:11.5.2
    ports:
      - "${GRAFANA_PORT:-3300}:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - tempo
      - loki

volumes:
  promtail_positions:
