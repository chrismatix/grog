name: query commands
repo: querying
cases:
  # List
  ###
  - name: list_by_tags
    grog_args:
      - list
      - //...
      - --tag=tag1
      - --tag=non-existent

  - name: list_by_exclude_tags
    grog_args:
      - list
      - //...
      - --exclude-tag=tag1

  - name: list_tests
    grog_args:
      - list
      - //...
      - --target-type=test

  - name: list_binary_targets
    grog_args:
      - list
      - //...
      - --target-type=bin_output

  - name: list_no_tests
    grog_args:
      - list
      - //...
      - --target-type=no_test

  - name: build_by_tags
    grog_args:
      - build
      - --tag=tag1
      - --tag=non-existent

  # This should only match and not recurse
  - name: list_by_pattern
    grog_args:
      - list
      - //package_1/...

  - name: list_current
    grog_args:
      - list

  # Deps
  ###
  - name: deps_intransitive
    grog_args:
      - deps
      - //package_2

  - name: deps_transitive
    grog_args:
      - deps
      - --transitive
      - //package_2

  # RDeps
  ###
  - name: rdeps_intransitive
    grog_args:
      - rdeps
      - //package_1:bar # Only depended on by foo_test

  - name: rdeps_transitive
    grog_args:
      - rdeps
      - --transitive
      - //package_1:bar

  # Owners
  ###
  - name: file_owners
    grog_args:
      - owners
      - package_1/source.txt

  # Changes
  - name: changes_no_transitive
    # Returns //package_1:bar for the source file change
    # Returns //package_2 for the build file change
    grog_args:
      - changes
      - --since=5e79b3bc4fc7f1978e78f917126710989bf0deaa

  - name: changes_transitive
    # Also returns //package_1:foo_test as a dependent on bar
    grog_args:
      - changes
      - --dependents=transitive
      - --since=5e79b3bc4fc7f1978e78f917126710989bf0deaa

  # Explain changes (tree view)
  - name: explain_changes
    # Default consumer-rooted view: leaf consumers as roots, walking back through
    # dependencies to directly-affected targets; changed input files attached as
    # leaves under them.
    grog_args:
      - explain-changes
      - --since=5e79b3bc4fc7f1978e78f917126710989bf0deaa

  - name: explain_changes_no_files
    # Consumer-rooted view without the file leaves.
    grog_args:
      - explain-changes
      - --show-files=false
      - --since=5e79b3bc4fc7f1978e78f917126710989bf0deaa

  - name: explain_changes_files_first
    # File-rooted tree: each changed file -> directly-affected target(s) -> transitive dependents.
    grog_args:
      - explain-changes
      - --files-first
      - --since=5e79b3bc4fc7f1978e78f917126710989bf0deaa

  - name: explain_changes_files_first_no_files
    # --files-first with the file roots dropped: one tree per directly-affected target.
    grog_args:
      - explain-changes
      - --files-first
      - --show-files=false
      - --since=5e79b3bc4fc7f1978e78f917126710989bf0deaa
