name: Binary outputs
repo: binary_output
cases:
  - name: using_bin_tool_works
    grog_args:
      - build

  - name: using_bin_tool_works_with_cache
    grog_args:
      - build

  # Regression for chrismatix/grog#155: when the bin_output file is missing
  # the cache restore must put it back AND keep the executable bit so the
  # binary can be invoked. Without the fix, dist/bin is restored as 0644
  # and `grog run` fails with EACCES.
  - name: run_after_cache_restore_preserves_exec_bit
    setup_command: rm -f dist/bin
    grog_args:
      - run
      - //:creates_bin_tool
      - --
      - foo

  - name: run_command_fails
    grog_args:
      - run
      - //:creates_bin_tool
    expect_fail: true

  - name: run_command_works
    grog_args:
      - run
      - //:creates_bin_tool
      - --
      - foo

  - name: run_command_in_package_works
    grog_args:
      - run
      - --in-package
      - //pkg:foo

  - name: run_command_works_rel_path
    grog_args:
      - run
      - :creates_bin_tool
      - --
      - foo

  - name: run_command_works_declared_bin_tool
    grog_args:
      - run
      - //:declares_bin_tool
      - --
      - bar
