name: simple json builds
repo: simple_json
cases:
  # This should only build foo
  - name: build_only_foo
    grog_args:
      - build
      - //foo

  # This should select foo as well
  - name: build_bar_should_also_build_foo
    grog_args:
      - build
      - //bar

  - name: run_checks
    grog_args:
      - check
