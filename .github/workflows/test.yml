name: Test

on:
  push:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    # Add "id-token" for the google authentication
    permissions:
      contents: "read"
      id-token: "write"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: "0"

      - name: Set up mise
        uses: jdx/mise-action@v4

      - name: Cache Go dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/go-build
            ~/Library/Caches/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Authenticate with GCloud
        id: "auth"
        uses: "google-github-actions/auth@v2"
        with:
          project_id: grog-457510
          workload_identity_provider: projects/546356038464/locations/global/workloadIdentityPools/grog-pool/providers/github
          service_account: grog-ci@grog-457510.iam.gserviceaccount.com

      - name: "Set up Cloud SDK"
        uses: "google-github-actions/setup-gcloud@v2"

      - name: "Use gcloud CLI"
        run: gcloud info

      - name: Configure Docker
        id: "configure-docker"
        run: gcloud auth configure-docker us-central1-docker.pkg.dev

      - name: Download Go modules
        run: go mod download

      - name: Build and test
        run: make full-test

      - name: Upload coverage badge
        run: |
          .github/upload_badge.sh
