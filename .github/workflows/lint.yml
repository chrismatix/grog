name: Lint

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  prek:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up mise
        uses: jdx/mise-action@v4

      - name: Run prek
        run: prek run --all-files
        env:
          TREEFMT_CI: true # Don't use formatter cache
