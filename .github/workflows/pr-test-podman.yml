name: PR Test (podman)

# Verifies that grog's OCI output handling is tool-agnostic by running the
# docker_output integration scenario against podman's docker-compat socket
# instead of the Docker daemon. The same `github.com/docker/docker/client`
# SDK call path is exercised end-to-end — only the daemon behind the socket
# changes.

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main

jobs:
  podman-interop:
    runs-on: ubuntu-latest

    permissions:
      contents: "read"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: "0"

      - name: Set up mise
        uses: jdx/mise-action@v4

      - name: Route docker CLI through podman
        run: |
          # ubuntu-latest ships both the Docker CLI and podman preinstalled.
          # We *do* need to make `docker build` actually use podman, not just
          # route Docker-CLI build requests to the podman socket — the two
          # paths disagree on image-name normalization. When the real Docker
          # CLI builds via DOCKER_HOST, the tag is stored by podman under
          # `localhost/<name>`; the Docker SDK then asks for
          # `docker.io/library/<name>` and gets "no such image".
          #
          # The Debian `podman-docker` package fixes this but can conflict
          # with the preinstalled docker-ce on `ubuntu-latest`. Drop in a
          # symlink instead — /usr/local/bin precedes /usr/bin in PATH, so
          # both `docker` and `docker build` in BUILD.yaml resolve to podman
          # with no package surgery.
          sudo ln -sf "$(command -v podman)" /usr/local/bin/docker
          docker --version
          podman --version

      - name: Mark grog's loopback registry as insecure for podman
        run: |
          # Docker auto-treats 127.0.0.1 as an insecure (HTTP) registry; podman
          # does not. Grog's in-process OCI proxy serves plain HTTP on a random
          # 127.0.0.1:<port>, so without this config podman tries HTTPS and
          # fails the push.
          mkdir -p ~/.config/containers/registries.conf.d
          cat > ~/.config/containers/registries.conf.d/grog-loopback.conf <<'EOF'
          [[registry]]
          location = "127.0.0.1"
          insecure = true
          EOF

      - name: Start podman compat socket
        run: |
          systemctl --user enable --now podman.socket
          echo "DOCKER_HOST=unix:///run/user/$(id -u)/podman/podman.sock" >> "$GITHUB_ENV"

      - name: Cache Go dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/go-build
            ~/Library/Caches/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Download Go modules
        run: go mod download

      - name: Build grog
        run: make build

      - name: Run docker_output scenario against podman
        run: |
          # Anchored with $ so only "Docker Tar Outputs" matches and not
          # "Docker Registry Outputs" (which requires cloud credentials).
          go test -v -timeout 360s ./integration/... -run 'TestCliScenarios/Docker_Tar_Outputs$'
