name: Release

on:
  push:
    tags:
      - "v*.*.*" # Only run on version tags

permissions:
  contents: write

jobs:
  release-bin:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
          - goos: linux
            goarch: arm64
            runner: ubuntu-24.04-arm
          - goos: darwin
            goarch: amd64
            runner: macos-latest
          - goos: darwin
            goarch: arm64
            runner: macos-latest
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Install protoc (Linux)
        if: matrix.goos == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Install protoc (macOS)
        if: matrix.goos == 'darwin'
        run: brew install protobuf

      - name: Install Go dependencies
        run: |
          go mod tidy
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest

      - name: Build release binary
        run: make release-build GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }}

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: grog-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*

  release-pkl:
    name: Build pkl package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pkl
        run: |
          curl -L -o pkl-bin 'https://github.com/apple/pkl/releases/download/0.30.0/pkl-linux-amd64'
          chmod +x pkl-bin
          sudo mv pkl-bin /usr/local/bin/pkl
          pkl --version

      - name: Build pkl package
        run: |
          VERSION=${GITHUB_REF_NAME} && cd pkl && VERSION=$VERSION pkl project package

      - name: Upload pkl artifact
        uses: actions/upload-artifact@v4
        with:
          name: pkl-package
          path: pkl/.out/**/*
          # pkl writes to the hidden `.out` directory; upload-artifact@v4
          # excludes hidden files by default, which silently dropped the
          # package (warning only, so the job still "succeeded").
          include-hidden-files: true

  # Builds the Terraform provider with goreleaser (build + archive + sign), but
  # stops short of publishing to the GitHub release — the `publish` job below
  # collects every artifact and uploads them together so there's a single
  # authoritative release-upload step.
  #
  # Required repository secrets: GPG_PRIVATE_KEY, PASSPHRASE
  # (the GPG public key must also be registered in your Terraform Registry
  # account for the registry to accept the SHA256SUMS signature).
  release-provider:
    name: Build Terraform provider
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@v6
        id: import_gpg
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.PASSPHRASE }}

      - name: Run GoReleaser (build only)
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          # --skip=publish defers the GitHub release upload to the publish job.
          args: release --clean --skip=publish
          workdir: terraform-provider-grog
        env:
          GPG_FINGERPRINT: ${{ steps.import_gpg.outputs.fingerprint }}

      - name: Upload provider artifacts
        uses: actions/upload-artifact@v4
        with:
          name: terraform-provider-grog
          path: terraform-provider-grog/dist/*

  publish:
    name: Publish release
    needs: [release-bin, release-pkl, release-provider]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Assemble dist
        run: |
          mkdir -p dist
          cp artifacts/grog-*/* dist/
          cd dist && shasum -a 256 * > SHASUMS256.txt

      - name: Draft Release Notes
        uses: release-drafter/release-drafter@v6
        with:
          tag: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          # Excludes goreleaser's intermediate metadata files (artifacts.json,
          # config.yaml, metadata.json) — only the provider archives, checksums,
          # signature, and registry manifest go to the release.
          files: |
            dist/*
            artifacts/pkl-package/**/*
            artifacts/terraform-provider-grog/terraform-provider-grog_*.zip
            artifacts/terraform-provider-grog/terraform-provider-grog_*_SHA256SUMS
            artifacts/terraform-provider-grog/terraform-provider-grog_*_SHA256SUMS.sig
            artifacts/terraform-provider-grog/terraform-provider-grog_*_manifest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
