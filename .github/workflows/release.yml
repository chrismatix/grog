name: Release

on:
  push:
    tags:
      - "v*.*.*" # Only run on version tags

permissions:
  contents: write

jobs:
  release-bin:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
          - goos: linux
            goarch: arm64
            runner: ubuntu-24.04-arm
          - goos: darwin
            goarch: amd64
            runner: macos-latest
          - goos: darwin
            goarch: arm64
            runner: macos-latest
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up mise
        uses: jdx/mise-action@v4

      - name: Cache Go dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/go-build
            ~/Library/Caches/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-${{ matrix.goos }}-${{ matrix.goarch }}-go-${{ hashFiles('go.sum') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.goos }}-${{ matrix.goarch }}-go-
            ${{ runner.os }}-go-

      - name: Download Go modules
        run: go mod download

      - name: Build release binary
        run: make release-build GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }}

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: grog-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*

  release-pkl:
    name: Build pkl package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up mise
        uses: jdx/mise-action@v4

      - name: Build pkl package
        run: |
          VERSION=${GITHUB_REF_NAME} && cd pkl && VERSION=$VERSION pkl project package

      - name: Upload pkl artifact
        uses: actions/upload-artifact@v4
        with:
          name: pkl-package
          path: pkl/.out/**/*
          # pkl writes to the hidden `.out` directory; upload-artifact@v4
          # excludes hidden files by default, which silently dropped the
          # package (warning only, so the job still "succeeded").
          include-hidden-files: true

  publish:
    name: Publish release
    needs: [release-bin, release-pkl]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Assemble dist
        run: |
          mkdir -p dist
          cp artifacts/grog-*/* dist/
          cd dist && shasum -a 256 * > SHASUMS256.txt

      - name: Draft Release Notes
        uses: release-drafter/release-drafter@v6
        with:
          tag: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*
            artifacts/pkl-package/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
